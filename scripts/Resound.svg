<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Dynamic Island / Notch pill outline -->
  <!-- Flat top edge, rounded bottom corners -->
  <g transform="translate(512, 440)">
    <!-- Pill dimensions: width=520, height=180, bottom-radius=28 -->
    <path d="M-260,0
             L-260,152
             Q-260,180 -232,180
             L232,180
             Q260,180 260,152
             L260,0
             Z"
          fill="none" stroke="white" stroke-width="4" opacity="1"/>

    <!-- Waveform bars inside pill -->
    <!-- Y-axis: positive is down in SVG. Pill top is y=0, bottom is y=180 -->
    <g fill="white">
      <!-- Bar 1 -->
      <rect x="-220" y="40" width="20" height="100" rx="10" opacity="0.4"/>
      <!-- Bar 2 -->
      <rect x="-185" y="20" width="20" height="140" rx="10" opacity="0.7"/>
      <!-- Bar 3 -->
      <rect x="-150" y="55" width="20" height="80" rx="10" opacity="0.5"/>
      <!-- Bar 4 - tallest, center-ish -->
      <rect x="-115" y="10" width="24" height="155" rx="12" opacity="1"/>
      <!-- Bar 5 -->
      <rect x="-75" y="30" width="20" height="125" rx="10" opacity="0.8"/>
      <!-- Bar 6 -->
      <rect x="-40" y="60" width="20" height="70" rx="10" opacity="0.45"/>
      <!-- Bar 7 -->
      <rect x="-5" y="35" width="20" height="115" rx="10" opacity="0.65"/>
      <!-- Bar 8 -->
      <rect x="30" y="15" width="24" height="145" rx="12" opacity="0.9"/>
      <!-- Bar 9 -->
      <rect x="70" y="45" width="20" height="95" rx="10" opacity="0.55"/>
      <!-- Bar 10 -->
      <rect x="105" y="25" width="20" height="130" rx="10" opacity="0.75"/>
      <!-- Bar 11 -->
      <rect x="140" y="50" width="20" height="85" rx="10" opacity="0.5"/>
      <!-- Bar 12 -->
      <rect x="175" y="65" width="20" height="60" rx="10" opacity="0.35"/>
    </g>
  </g>
</svg>
